<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Article — ResearchLog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script> -->
  <link rel="stylesheet" href="libs/github-dark.min.css" />
  <script src="libs/marked.min.js"></script>
  <script src="libs/highlight.min.js"></script>
  <!-- <link rel="stylesheet" href="libs/katex.min.css" />
  -->
  <script>
  // MathJax = {
  //   tex: {
  //     inlineMath: [['$', '$'], ['\\(', '\\)']],
  //     displayMath: [['$$', '$$'], ['\\[', '\\]']],
  //     processEscapes: true
  //   },
  //   options: {
  //     skipHtmlTags: ['script','noscript','style','textarea','pre']
  //   }
  // };
  MathJax = {
    startup: {
      ready() {
        MathJax.startup.defaultReady();
      }
    },
    chtml: {
      fontURL: 'https://unpkg.com/mathjax@3.2.2/es5/output/chtml/fonts/woff-v2'
    },
    loader: { load: [] },
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true,
      packages: {'[-]': ['color']}
    },
    options: {
      skipHtmlTags: ['script','noscript','style','textarea','pre']
    }
  };
  </script>
  <!-- <script src="libs/mathjax.min.js"></script> -->
  <script src="libs/mathjax.min.js" async></script>


  
  <style>
    :root {
      --bg: #0c0e12;
      --bg-card: #13161d;
      --border: #1f2433;
      --border-subtle: #161922;
      --text: #cdd6f4;
      --text-muted: #6c7086;
      --text-dim: #45475a;
      --accent: #cba6f7;
      --accent2: #89b4fa;
      --accent3: #a6e3a1;
      --accent-warm: #fab387;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.7;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border-subtle) 1px, transparent 1px),
        linear-gradient(90deg, var(--border-subtle) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Top nav ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(12,14,18,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      transition: color 0.15s;
    }
    .back-btn:hover { color: var(--accent); }
    .nav-title {
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      color: var(--text-dim);
      max-width: 400px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Article layout ── */
    /* .article-wrap {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    } */
    .article-wrap {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 240px 80px 24px; /* 右侧加 240px 给 TOC 让位 */
    }

    /* ── Article header ── */
    .article-header {
      margin-bottom: 48px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }
    .article-meta-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .article-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-dim);
    }
    .article-type-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      padding: 3px 9px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .article-type-badge.md { background: rgba(166,227,161,0.1); color: var(--accent3); }
    .article-type-badge.pdf { background: rgba(250,179,135,0.1); color: var(--accent-warm); }

    .article-title {
      font-family: 'Crimson Pro', serif;
      font-size: 2.6rem;
      font-weight: 600;
      line-height: 1.2;
      color: #fff;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }
    .article-excerpt {
      font-size: 16px;
      color: var(--text-muted);
      line-height: 1.7;
      font-style: italic;
      font-family: 'Crimson Pro', serif;
      margin-bottom: 20px;
    }
    .article-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .article-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 4px;
      background: #1e1e2e;
      border: 1px solid #313244;
      color: var(--text-muted);
    }
    .article-tag.keyword {
      border-color: rgba(137,180,250,0.3);
      color: var(--accent2);
      background: rgba(137,180,250,0.07);
    }

    /* ── Markdown content ── */
    .md-content {
      font-family: 'Crimson Pro', serif;
      font-size: 1.15rem;
      line-height: 1.85;
    }
    .md-content h1, .md-content h2, .md-content h3, .md-content h4 {
      font-family: 'Crimson Pro', serif;
      font-weight: 600;
      color: #fff;
      margin: 2.2em 0 0.8em;
      line-height: 1.3;
    }
    .md-content h1 { font-size: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 0.4em; }
    .md-content h2 { font-size: 1.6rem; }
    .md-content h3 { font-size: 1.3rem; color: var(--text); }
    .md-content h4 { font-size: 1.1rem; color: var(--text-muted); }
    .md-content p { margin-bottom: 1.3em; }
    .md-content a { color: var(--accent2); text-decoration: underline; text-underline-offset: 3px; }
    .md-content a:hover { color: var(--accent); }
    .md-content strong { color: #fff; font-weight: 600; }
    .md-content em { font-style: italic; color: var(--text); }
    .md-content blockquote {
      border-left: 3px solid var(--accent);
      margin: 1.5em 0;
      padding: 12px 20px;
      background: rgba(203,166,247,0.05);
      border-radius: 0 6px 6px 0;
      color: var(--text-muted);
      font-style: italic;
    }
    .md-content ul, .md-content ol {
      padding-left: 1.5em;
      margin-bottom: 1.3em;
    }
    .md-content li { margin-bottom: 0.4em; }
    .md-content code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85em;
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--accent3);
    }
    .md-content pre {
      background: #0d1117 !important;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      overflow-x: auto;
      margin: 1.5em 0;
      position: relative;
    }
    .md-content pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 13px;
      color: inherit;
    }
    .md-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5em 0;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
    }
    .md-content th, .md-content td {
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .md-content th { color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }
    .md-content tr:hover td { background: var(--bg-card); }
    .md-content img { max-width: 100%; border-radius: 8px; border: 1px solid var(--border); }
    .md-content hr { border: none; border-top: 1px solid var(--border); margin: 2.5em 0; }

    /* Math (KaTeX placeholder) */
    .md-content .math-block {
      overflow-x: auto;
      padding: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin: 1.5em 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--accent);
    }

    /* ── PDF viewer ── */
    .pdf-wrap {
      width: 100%;
      height: 85vh;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--bg-card);
    }
    .pdf-wrap embed {
      width: 100%;
      height: 100%;
      border: none;
    }
    .pdf-fallback {
      padding: 40px;
      text-align: center;
    }
    .pdf-fallback a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent-warm);
      color: #1e1e2e;
      padding: 12px 24px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 500;
      margin-top: 16px;
    }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }
    .loading::before {
      content: '>';
      display: block;
      font-size: 24px;
      margin-bottom: 16px;
      animation: blink 1s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── TOC ── */
    .toc-aside {
      position: fixed;
      right: max(24px, calc(50vw - 600px));
      top: 80px;
      width: 200px;
      max-height: calc(100vh - 120px);
      overflow-y: auto;
      z-index: 10;
    }
    @media (max-width: 1200px) { .toc-aside { display: none; } }
    .toc-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }
    .toc-list { list-style: none; }
    .toc-item a {
      display: block;
      padding: 4px 8px;
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      border-left: 2px solid transparent;
      transition: all 0.15s;
    }
    .toc-item a:hover { color: var(--accent); border-color: var(--accent); }
    .toc-item.active a { color: var(--accent); border-color: var(--accent); }
    .toc-item.h3 a { padding-left: 16px; font-size: 11px; }

    @media (max-width: 640px) {
      .article-title { font-size: 1.8rem; }
    }
    @media (max-width: 1200px) {
      .toc-aside { display: none; }
      .article-wrap {
        padding: 48px 24px 80px 24px; /* 小屏恢复对称 padding */
      }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="back-btn" href="index.html">← 返回列表</a>
    <span class="nav-title" id="navTitle">Loading…</span>
  </div>
</nav>

<!-- TOC -->
<aside class="toc-aside" id="toc" style="display:none">
  <div class="toc-title">// Contents</div>
  <ul class="toc-list" id="tocList"></ul>
</aside>

<main class="article-wrap" id="main">
  <div class="loading" id="loadingIndicator">Loading article…</div>
</main>

<script>
marked.setOptions({
  highlight: (code, lang) => {
    if (lang && hljs.getLanguage(lang)) {
      return hljs.highlight(code, { language: lang }).value;
    }
    return hljs.highlightAuto(code).value;
  },
  breaks: true,
  gfm: true
});

async function loadArticle() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if (!id) { showError('未指定文章 ID'); return; }

  // Load metadata
  let meta;
  try {
    const res = await fetch('data/articles.json');
    const articles = await res.json();
    meta = articles.find(a => a.id === id);
  } catch {
    meta = getDemoMeta(id);
  }
  if (!meta) { showError(`找不到文章: ${id}`); return; }

  document.title = `${meta.title} — ResearchLog`;
  document.getElementById('navTitle').textContent = meta.title;

  const main = document.getElementById('main');

  if (meta.type === 'pdf') {
    renderPdf(main, meta);
  } else {
    await renderMarkdown(main, meta);
  }
}

function renderHeader(meta) {
  return `
    <div class="article-header">
      <div class="article-meta-top">
        <span class="article-date">${formatDate(meta.date)}</span>
        <span class="article-type-badge ${meta.type}">${meta.type.toUpperCase()}</span>
      </div>
      <h1 class="article-title">${meta.title}</h1>
      ${meta.excerpt ? `<p class="article-excerpt">${meta.excerpt}</p>` : ''}
      <div class="article-tags">
        ${meta.tags.map(t => `<span class="article-tag">${t}</span>`).join('')}
        ${meta.keywords.map(k => `<span class="article-tag keyword">${k}</span>`).join('')}
      </div>
    </div>
  `;
}

async function renderMarkdown(main, meta) {
  try {
    const res = await fetch(meta.file);
    if (!res.ok) throw new Error('File not found');
    // 把 \textcolor{color}{文字} 转成 <span style="color:...">
    text = await res.text();
    text = text.replace(/\\textcolor\{([^}]+)\}\{([^}]+)\}/g, 
      (_, color, content) => `<span style="color:${color}">${content}</span>`
    );
    // const text = await res.text();
    // const html = marked.parse(text);
    const basePath = meta.file.substring(0, meta.file.lastIndexOf('/') + 1);
    const html = marked.parse(text.replace(
      /!\[([^\]]*)\]\((?!http)([^)]+)\)/g,
      (_, alt, src) => `![${alt}](${basePath}${src})`
    ));
    // main.innerHTML = renderHeader(meta) + `<div class="md-content" id="mdContent">${html}</div>`;
    // hljs.highlightAll();
    main.innerHTML = renderHeader(meta) + `<div class="md-content" id="mdContent">${html}</div>`;
    hljs.highlightAll();
    
    // 等待 MathJax 自身的启动 Promise
    window.MathJax.startup.promise.then(() => {
      MathJax.typesetPromise([document.getElementById('mdContent')]);
    });
    // MathJax.typesetPromise();
    // if (window.MathJax && MathJax.typesetPromise) {
    //   await MathJax.typesetPromise([document.getElementById('mdContent')]);
    // } else {
    //   // MathJax 还没加载完，等待后重试
    //   setTimeout(() => MathJax.typesetPromise([document.getElementById('mdContent')]), 1000);
    // }
    const waitForMathJax = () => new Promise(resolve => {
      const check = () => {
        if (window.MathJax && MathJax.typesetPromise) {
          resolve();
        } else {
          setTimeout(check, 100);
        }
      };
      check();
    });
    
    await waitForMathJax();
    await MathJax.typesetPromise([document.getElementById('mdContent')]);
    document.getElementById('mdContent').innerHTML = html;
    hljs.highlightAll();
    MathJax.typesetPromise(); // MathJax 渲染公式
    main.innerHTML = renderHeader(meta) + `<div class="md-content" id="mdContent">${html}</div>`;
    buildTOC();
    hljs.highlightAll();
  } catch(e) {
    console.error('renderMarkdown error:', e);
    main.innerHTML = renderHeader(meta) + `
      <div class="md-content">
        <blockquote>
          <strong>文件未找到</strong>：请确保 <code>${meta.file}</code> 文件已上传到仓库的对应目录。
        </blockquote>
        <p>将你的 Markdown 文件放入仓库后，这里会自动渲染全文内容。</p>
        <h2>文章关键词</h2>
        <ul>${meta.keywords.map(k => `<li>${k}</li>`).join('')}</ul>
      </div>`;
  }
}

function renderPdf(main, meta) {
  main.innerHTML = renderHeader(meta) + `
    <div class="pdf-wrap">
      <embed src="${meta.file}" type="application/pdf" />
    </div>
    <div class="pdf-fallback" style="margin-top:16px; text-align:center;">
      <span style="color:var(--text-muted); font-size:13px">如果 PDF 无法显示，</span>
      <a href="${meta.file}" target="_blank" download>📥 直接下载 PDF</a>
    </div>
  `;
}

function buildTOC() {
  const headings = document.querySelectorAll('.md-content h2, .md-content h3');
  if (headings.length < 3) return;

  const toc = document.getElementById('toc');
  const list = document.getElementById('tocList');
  toc.style.display = 'block';

  headings.forEach((h, i) => {
    const anchor = `heading-${i}`;
    h.id = anchor;
    const li = document.createElement('li');
    li.className = `toc-item ${h.tagName === 'H3' ? 'h3' : ''}`;
    li.innerHTML = `<a href="#${anchor}">${h.textContent}</a>`;
    list.appendChild(li);
  });

  // Scroll spy
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        document.querySelectorAll('.toc-item').forEach(i => i.classList.remove('active'));
        const active = list.querySelector(`a[href="#${e.target.id}"]`);
        if (active) active.parentElement.classList.add('active');
      }
    });
  }, { rootMargin: '-20% 0px -70% 0px' });

  headings.forEach(h => observer.observe(h));
}

function showError(msg) {
  document.getElementById('main').innerHTML = `
    <div style="text-align:center; padding:80px 20px; color:var(--text-muted);">
      <p style="font-family:'JetBrains Mono',monospace; font-size:48px; opacity:0.2">404</p>
      <p>${msg}</p>
      <a href="index.html" style="color:var(--accent); margin-top:16px; display:inline-block;">← 返回首页</a>
    </div>`;
}

function formatDate(d) {
  return new Date(d).toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
}

function getDemoMeta(id) {
  const demos = {
    "spectral-gnn-intro": {
      id: "spectral-gnn-intro", title: "Introduction to Spectral Graph Neural Networks",
      file: "articles/spectral-gnn-intro.md", type: "md", date: "2026-03-15",
      tags: ["GNN", "spectral", "deep learning"], keywords: ["ChebNet", "graph Laplacian"],
      excerpt: "An overview of spectral-domain approaches to graph neural networks."
    }
  };
  return demos[id];
}

loadArticle();
</script>
</body>
</html>
